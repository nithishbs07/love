<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>For You ❤️</title>

<style>
body{margin:0;overflow:hidden;color:white;font-family:Arial}
.bg img{position:fixed;width:100%;height:100%;object-fit:cover;opacity:0;transition:2s}
.overlay{position:fixed;width:100%;height:100%;background:linear-gradient(to top, rgba(255,0,150,.5), rgba(0,0,0,.9))}
.container{height:100vh;display:flex;justify-content:center;align-items:center;flex-direction:column;text-align:center}
button{padding:12px 25px;border:none;border-radius:20px;background:#ff4da6;color:white;font-size:18px;margin-top:20px}
.no{position:absolute;background:#333}
</style>
</head>

<body>

<div class="bg">
  <img id="img1">
  <img id="img2">
</div>

<div class="overlay"></div>

<div class="container" id="main">
  <h1>Hey Rithika ❤️</h1>
  <button onclick="start()">Start</button>
</div>

<audio id="audio"></audio>

<script>
var img1=document.getElementById("img1");
var img2=document.getElementById("img2");
var audio=document.getElementById("audio");

img1.src="https://i.ibb.co/KzrP49hG/photo1-jpeg.jpg";
img2.src="https://i.ibb.co/spWV2fMB/photo2-jpeg.jpg";
audio.src="https://files.catbox.moe/vlrcxp.mp3";

var imgs=document.querySelectorAll(".bg img");
var index=0;
imgs[0].style.opacity=1;

setInterval(function(){
  imgs[0].style.opacity=0;
  imgs[1].style.opacity=0;
  imgs[index].style.opacity=1;
  index=(index+1)%2;
},3000);

var notes=[
"Do you remember the first time we met…?",
"It felt special…",
"Your smile…",
"I never forgot you…",
"I made mistakes…",
"But I still love you…",
"So today… ❤️"
];

var i=0;

function start(){showNotes();}

function showNotes(){
  if(i<notes.length){
    main.innerHTML="<h1>"+notes[i]+"</h1>";
    i++;
    setTimeout(showNotes,2000);
  } else voice();
}

function voice(){
  main.innerHTML="<h1>Listen to me ❤️</h1><button onclick='play()'>Play Voice 🎤</button><br><button onclick='proposal()'>Continue</button>";
}

function play(){audio.play();}

function proposal(){
  main.innerHTML="<h1>Will You Be Mine? 💍</h1><button onclick='yes()'>YES ❤️</button><button class='no' id='noBtn'>NO 💔</button>";
  var b=document.getElementById("noBtn");
  b.onmouseover=function(){
    b.style.left=Math.random()*80+"%";
    b.style.top=Math.random()*80+"%";
  };
}

function yes(){
  document.body.innerHTML="<div style='height:100vh;display:flex;justify-content:center;align-items:center;background:black'><h1 style='font-size:60px;color:pink'>❤️ I LOVE YOU ❤️</h1></div>";
}
</script>

</body>
</html>
