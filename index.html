<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>For You ❤️</title>

<style>
body{
  margin:0;
  overflow:hidden;
  font-family:'Segoe UI', sans-serif;
  background:radial-gradient(circle at center,#1a001f,#000);
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  text-align:center;
}

/* TEXT */
h1{
  font-size:42px;
  text-shadow:0 0 25px #ff4da6;
  min-height:70px;
}

/* BUTTON */
button{
  padding:12px 30px;
  border:none;
  border-radius:30px;
  background:#ff4da6;
  color:white;
  font-size:18px;
  margin-top:20px;
  cursor:pointer;
  box-shadow:0 0 15px #ff4da6;
}

/* NO BUTTON */
.no{
  position:absolute;
  background:#333;
}

/* HEARTS */
.heart{
  position:fixed;
  bottom:-10px;
  color:#ff4da6;
  animation:float 6s linear infinite;
}
@keyframes float{
  to{transform:translateY(-100vh);opacity:0;}
}

/* CURSOR HEART */
.click-heart{
  position:fixed;
  color:#ff4da6;
  animation:pop 1s forwards;
}
@keyframes pop{
  to{transform:translateY(-40px);opacity:0;}
}

/* GLOW */
.glow{
  animation:glow 1s infinite alternate;
}
@keyframes glow{
  from{text-shadow:0 0 20px #ff4da6;}
  to{text-shadow:0 0 50px #ff99cc;}
}

/* SHAKE */
@keyframes shake{
  0%{transform:translateX(0);}
  25%{transform:translateX(5px);}
  50%{transform:translateX(-5px);}
  75%{transform:translateX(5px);}
  100%{transform:translateX(0);}
}
.shake{
  animation:shake 0.4s;
}
</style>

</head>

<body>

<div id="main">
  <h1 id="text">Hey Rithika ❤️</h1>
  <button onclick="start()">Start</button>
</div>

<script>

/* FLOATING HEARTS */
setInterval(()=>{
  let h=document.createElement("div");
  h.innerHTML="❤️";
  h.className="heart";
  h.style.left=Math.random()*100+"%";
  h.style.fontSize=(10+Math.random()*20)+"px";
  document.body.appendChild(h);
  setTimeout(()=>h.remove(),6000);
},250);

/* CLICK HEART EFFECT */
document.addEventListener("click",(e)=>{
  let h=document.createElement("div");
  h.innerHTML="❤️";
  h.className="click-heart";
  h.style.left=e.clientX+"px";
  h.style.top=e.clientY+"px";
  document.body.appendChild(h);
  setTimeout(()=>h.remove(),1000);
});

/* TYPEWRITER */
function typeText(text,callback){
  let i=0;
  let el=document.getElementById("text");
  el.innerHTML="";
  let t=setInterval(()=>{
    el.innerHTML+=text[i];
    i++;
    if(i>=text.length){
      clearInterval(t);
      if(callback) setTimeout(callback,1200);
    }
  },40);
}

/* STORY */
let notes=[
"The first time I saw you…",
"I didn’t expect anything…",
"But something felt different…",
"Your smile… it stayed with me…",
"And slowly… you stayed in my heart…",
"That bus ride…",
"When you leaned on my shoulder…",
"I didn’t want that moment to end…",
"Our laughs… our silence…",
"Everything felt right…",
"I made mistakes…",
"And I hurt you…",
"But I never stopped loving you…",
"Not even for a second…",
"You were always there…",
"In every thought…",
"In every heartbeat…",
"So today…",
"I just want to ask you one thing…"
];

let i=0;

function start(){
  showNotes();
}

function showNotes(){
  if(i<notes.length){
    typeText(notes[i],showNotes);
    i++;
  } else {
    secretPhase();
  }
}

/* SECRET PHASE 😈 */
function secretPhase(){
  document.getElementById("main").innerHTML=
    "<h1>Tap 5 times to unlock ❤️</h1>";
  
  let taps=0;

  document.body.onclick=function(){
    taps++;
    if(taps>=5){
      countdown();
      document.body.onclick=null;
    }
  };
}

/* COUNTDOWN */
function countdown(){
  let c=3;
  function next(){
    if(c>0){
      document.getElementById("main").innerHTML="<h1>"+c+"...</h1>";
      c--;
      setTimeout(next,800);
    } else {
      proposal();
    }
  }
  next();
}

/* PROPOSAL */
function proposal(){
  document.getElementById("main").innerHTML=
    "<h1 class='glow'>Will You Be Mine? 💍</h1>"+
    "<button onclick='yes()'>YES ❤️</button>"+
    "<button class='no' id='noBtn'>NO 💔</button>";

  let b=document.getElementById("noBtn");

  b.onmouseover=function(){
    b.style.left=Math.random()*80+"%";
    b.style.top=Math.random()*80+"%";
    b.classList.add("shake");
    setTimeout(()=>b.classList.remove("shake"),300);
  };
}

/* FINAL */
function yes(){
  document.body.innerHTML=
    "<h1 class='glow' style='font-size:65px'>❤️ I LOVE YOU ❤️</h1>";
}

</script>

</body>
</html>
