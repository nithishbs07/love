<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>For You ❤️</title>

<style>
body{
  margin:0;
  overflow:hidden;
  font-family:'Segoe UI', sans-serif;
  background:linear-gradient(-45deg,#000,#2a0033,#ff4da6,#ff99cc);
  background-size:400% 400%;
  animation:bgMove 10s infinite alternate;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  text-align:center;
}

/* BACKGROUND ANIMATION */
@keyframes bgMove{
  0%{background-position:0% 50%;}
  100%{background-position:100% 50%;}
}

/* TEXT */
h1{
  font-size:40px;
  text-shadow:0 0 25px pink;
  min-height:60px;
}

/* BUTTON */
button{
  padding:12px 30px;
  border:none;
  border-radius:30px;
  background:#ff4da6;
  color:white;
  font-size:18px;
  cursor:pointer;
  margin-top:20px;
  box-shadow:0 0 15px #ff4da6;
}

.no{
  position:absolute;
  background:#333;
}

/* FLOATING HEARTS */
.heart{
  position:fixed;
  bottom:-10px;
  color:#ff4da6;
  animation:float 6s linear infinite;
}

@keyframes float{
  to{
    transform:translateY(-100vh);
    opacity:0;
  }
}

/* FINAL GLOW */
.glow{
  animation:glow 1s infinite alternate;
}

@keyframes glow{
  from{text-shadow:0 0 20px pink;}
  to{text-shadow:0 0 40px #ff99cc;}
}
</style>

</head>

<body>

<div id="main">
  <h1 id="text">Hey Rithika ❤️</h1>
  <button onclick="start()">Start</button>
</div>

<script>

/* ❤️ HEART ANIMATION */
setInterval(()=>{
  let heart=document.createElement("div");
  heart.innerHTML="❤️";
  heart.className="heart";
  heart.style.left=Math.random()*100+"%";
  heart.style.fontSize=(10+Math.random()*20)+"px";
  document.body.appendChild(heart);

  setTimeout(()=>heart.remove(),6000);
},300);

/* 💬 TYPEWRITER EFFECT */
function typeText(text,callback){
  let i=0;
  let el=document.getElementById("text");
  el.innerHTML="";
  
  let typing=setInterval(()=>{
    el.innerHTML+=text[i];
    i++;
    if(i>=text.length){
      clearInterval(typing);
      if(callback) setTimeout(callback,1000);
    }
  },40);
}

/* ❤️ STORY */
let notes=[
"Do you remember the first time we met…?",
"It didn’t feel like a normal moment…",
"It felt like something had already started…",
"That first look… I still remember it…",
"Your smile… stayed with me…",
"And slowly… you stayed in my heart…",
"That bus ride… sitting close to you…",
"When you leaned on my shoulder…",
"Everything felt calm… peaceful… real…",
"Like the world paused just for us…",
"Our talks… became something deeper…",
"Our laughs… meant everything to me…",
"Those bike rides… those random moments…",
"They became my favorite memories…",
"Dancing together… without caring…",
"That happiness… I never felt before…",
"And when I cooked for you…",
"It wasn’t just food… it was love…",
"I know… I made mistakes…",
"I know… I hurt you…",
"And I regret that… every day…",
"But one thing I never did…",
"Was stop loving you…",
"Not even for a second…",
"You were always in my heart…",
"In every thought… every moment…",
"Even in silence… it was you…",
"So today… I just want to say…",
"I still feel the same…",
"And I always will… ❤️"
];

let i=0;

function start(){
  showNotes();
}

function showNotes(){
  if(i<notes.length){
    typeText(notes[i],showNotes);
    i++;
  } else {
    countdown();
  }
}

/* ⏳ COUNTDOWN */
function countdown(){
  let count=3;
  function next(){
    if(count>0){
      typeText(count+"...",()=>{
        count--;
        next();
      });
    } else {
      proposal();
    }
  }
  next();
}

/* 💍 PROPOSAL */
function proposal(){
  document.getElementById("main").innerHTML=
    "<h1 class='glow'>Will You Be Mine? 💍</h1>"+
    "<button onclick='yes()'>YES ❤️</button>"+
    "<button class='no' id='noBtn'>NO 💔</button>";

  let b=document.getElementById("noBtn");

  b.onmouseover=function(){
    b.style.left=Math.random()*80+"%";
    b.style.top=Math.random()*80+"%";
    b.style.transform="rotate("+Math.random()*360+"deg)";
  };
}

/* ❤️ FINAL */
function yes(){
  document.body.innerHTML=
    "<h1 class='glow' style='font-size:60px'>❤️ I LOVE YOU ❤️</h1>";
}

</script>

</body>
</html>
