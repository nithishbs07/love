<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For You ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}

body{
  overflow:hidden;
  color:white;
}

/* BACKGROUND */
.bg{
  position:fixed;
  width:100%;
  height:100%;
  z-index:-2;
}

.bg img{
  position:absolute;
  width:100%;
  height:100%;
  object-fit:cover;
  opacity:0;
  transition:2s;
}

/* OVERLAY */
.overlay{
  position:fixed;
  width:100%;
  height:100%;
  background:linear-gradient(to top, rgba(255,0,150,0.5), rgba(0,0,0,0.85));
  z-index:-1;
}

/* CONTAINER */
.container{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  text-align:center;
  padding:20px;
  backdrop-filter:blur(10px);
}

/* TEXT */
h1{
  font-size:55px;
  text-shadow:0 0 25px pink;
  animation:fadeIn 1.5s ease;
}

p{
  font-size:20px;
  max-width:700px;
  line-height:1.8;
  margin-top:15px;
  animation:fadeIn 2s ease;
}

/* BUTTON */
button{
  margin-top:25px;
  padding:15px 35px;
  border:none;
  border-radius:30px;
  font-size:18px;
  cursor:pointer;
  transition:0.3s;
}

.yes{
  background:#ff4da6;
  box-shadow:0 0 20px #ff4da6;
}

.no{
  background:#333;
  position:absolute;
}

button:hover{
  transform:scale(1.1);
}

/* ANIMATION */
@keyframes fadeIn{
  from{opacity:0; transform:translateY(30px);}
  to{opacity:1; transform:translateY(0);}
}
</style>
</head>

<body>

<!-- BACKGROUND IMAGES -->
<div class="bg">
 <img src="photo1.jpeg">
 <img src="photo2.jpeg">
</div>

<div class="overlay"></div>

<div class="container" id="main">

<h1>Hey Rithika… ❤️</h1>
<p>This is not just a website…</p>

<button onclick="start()">Start</button>

</div>

<script>

/* BACKGROUND SLIDESHOW */
let imgs = document.querySelectorAll('.bg img');
let index = 0;

function showSlide(){
  imgs.forEach(img => img.style.opacity = 0);
  imgs[index].style.opacity = 1;
  index = (index + 1) % imgs.length;
}
setInterval(showSlide, 5000);
showSlide();

/* STORY NOTES */
let notes = [
"Do you remember the first time we met…?",
"That moment didn’t feel normal to me…",
"It felt like something had already started…",
"That bus ride… your smile…",
"And the way you leaned on my shoulder…",
"Everything felt calm… like the world paused…",
"Our bike rides… the laughter… the silence…",
"Dancing together… without caring about anything…",
"Even the way I cooked for you…",
"Those weren’t just moments… they were feelings…",
"I know I made mistakes…",
"And I know I hurt you…",
"But one thing I never did…",
"Was stop loving you…",
"So today… I’m here… with one simple question…"
];

let i = 0;

/* START STORY */
function start(){
  showNotes();
}

function showNotes(){
  if(i < notes.length){
    document.getElementById("main").innerHTML = `
      <h1>${notes[i]}</h1>
    `;
    i++;
    setTimeout(showNotes, 2500);
  } else {
    voice();
  }
}

/* VOICE SECTION */
function voice(){
  document.getElementById("main").innerHTML = `
    <h1>Listen to me… ❤️</h1>
    <audio controls autoplay>
      <source src="voice.mp3" type="audio/mpeg">
    </audio>
    <br>
    <button onclick="proposal()">Continue</button>
  `;
}

/* PROPOSAL */
function proposal(){
  document.getElementById("main").innerHTML = `
    <h1>Will You Be Mine? 💍</h1>
    <button class="yes" onclick="yes()">YES ❤️</button>
    <button class="no" id="noBtn">NO 💔</button>
  `;

  let noBtn = document.getElementById("noBtn");

  noBtn.addEventListener("mouseover", () => {
    let x = Math.random() * window.innerWidth * 0.8;
    let y = Math.random() * window.innerHeight * 0.8;
    noBtn.style.left = x + "px";
    noBtn.style.top = y + "px";
  });
}

/* FINAL YES SCREEN */
function yes(){
  document.body.innerHTML = `
    <div style="
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      text-align:center;
      background:linear-gradient(to top, #000, #2a0033, #ff4da6);
      color:white;
      font-family:Poppins;
    ">
      <div>
        <h1 style="
          font-size:70px;
          text-shadow:0 0 40px #ff4da6;
        ">
          ❤️ I Love You ❤️
        </h1>
        
        <p style="
          font-size:22px;
          margin-top:20px;
          opacity:0.9;
        ">
          You are my peace. My happiness. My forever.
        </p>
      </div>
    </div>
  `;
}

</script>

</body>
</html>
